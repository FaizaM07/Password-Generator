name: SonarQube Analysis
on:
  push:
    branches:
      - master
jobs:
  sonarqube:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'
      - name: Compile Java
        run: |
          mkdir -p "Password Generator/bin"
          javac -d "Password Generator/bin" \
            "Password Generator/src/Alphabet.java" \
            "Password Generator/src/Generator.java" \
            "Password Generator/src/Password.java" \
            "Password Generator/src/Main.java"
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
